name: Release YayMail Payment QR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Verify Build
        run: |
          find . -name '*.php' -print0 | xargs -0 -n1 php -l
          VERSION="$(tr -d '\r\n' < VERSION)"
          PLUGIN_VERSION="$(sed -n "s/^ \* Version: //p" ar-design-yaymail-payment-qr.php | tr -d '\r\n')"
          if [ "$VERSION" != "$PLUGIN_VERSION" ]; then
            echo "VERSION file ($VERSION) does not match plugin header ($PLUGIN_VERSION)." >&2
            exit 1
          fi

      - name: Resolve Version
        id: version
        run: |
          VERSION="$(tr -d '\r\n' < VERSION)"
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" != "$TAG" ]; then
            echo "Git tag does not match VERSION file. Expected $TAG but got ${{ github.ref_name }}." >&2
            exit 1
          fi

      - name: Build Release Zip
        run: |
          rm -rf /tmp/ar-design-yaymail-payment-qr-release
          mkdir -p /tmp/ar-design-yaymail-payment-qr-release/ar-design-yaymail-payment-qr
          rsync -a ./ /tmp/ar-design-yaymail-payment-qr-release/ar-design-yaymail-payment-qr/ --exclude='.git' --exclude='.github' --exclude='.DS_Store'
          cd /tmp/ar-design-yaymail-payment-qr-release
          zip -r ar-design-yaymail-payment-qr.zip ar-design-yaymail-payment-qr

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AR Design YayMail Payment QR ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            /tmp/ar-design-yaymail-payment-qr-release/ar-design-yaymail-payment-qr.zip
